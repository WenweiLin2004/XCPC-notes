<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="XCPC Notes">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="balloon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="0.55" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="shine" cx="0.35" cy="0.3" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="64" height="64" rx="15" fill="url(#bg)"/>

  <!-- orbit / trailing path of a balloon that rose and fell -->
  <path d="M12 54 C 20 30, 30 50, 40 24" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="2 3" stroke-linecap="round"/>

  <!-- balloon body -->
  <ellipse cx="34" cy="24" rx="14" ry="16" fill="url(#balloon)"/>
  <ellipse cx="34" cy="24" rx="14" ry="16" fill="url(#shine)"/>

  <!-- code symbol inside the balloon -->
  <g stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M30 18 L26 24 L30 30"/>
    <path d="M38 18 L42 24 L38 30"/>
  </g>

  <!-- balloon knot + string -->
  <path d="M34 40 l-2.2 3 h4.4 z" fill="#a855f7"/>
  <path d="M34 43 c 3 4, -3 6, 0 10 c 2 3, -1 4, 0 6" fill="none" stroke="#64748b" stroke-width="1.4" stroke-linecap="round"/>

  <!-- small released sparks -->
  <circle cx="50" cy="14" r="1.5" fill="#f472b6"/>
  <circle cx="14" cy="20" r="1.2" fill="#38bdf8"/>
  <circle cx="49" cy="40" r="1.2" fill="#34d399"/>
</svg>
